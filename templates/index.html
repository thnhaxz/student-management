<html>
<body>

<h2>Student List</h2>

<form method="get">
<input name="search" placeholder="Search name">
<button type="submit">Search</button>
</form>

<a href="/add">Add Student</a>
<a href="/stats">Statistics</a>
<a href="/export">Export CSV</a>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Major</th>
<th>GPA</th>
<th>Class</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{s.student_id}}</td>
<td>{{s.name}}</td>
<td>{{s.major}}</td>
<td>{{s.gpa}}</td>
<td>{{s.class_id}}</td>

<td>
<a href="/delete/{{s.student_id}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
