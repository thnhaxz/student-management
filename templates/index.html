<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>

<body>

<h2>Student List</h2>

<a href="/add">Add Student</a>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Major</th>
<th>GPA</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{s.student_id}}</td>
<td>{{s.name}}</td>
<td>{{s.major}}</td>
<td>{{s.gpa}}</td>

<td>
<a href="/delete/{{s.student_id}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
